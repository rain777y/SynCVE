[pytest]
testpaths = unit integration regression e2e
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    gpu: marks tests requiring GPU
    gemini: marks tests requiring Gemini API
    unit: marks unit tests (fully mocked, no GPU/network)
    regression: marks regression tests
    e2e: marks end-to-end tests (real APIs, real database, real inference)
addopts = -v --tb=short
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning

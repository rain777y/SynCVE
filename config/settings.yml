# ============================================================================
# SynCVE Application Settings
# This file is tracked in git. Do NOT put API keys or passwords here.
# Secrets go in config/secrets.yml (gitignored).
# ============================================================================

server:
  host: "0.0.0.0"
  port: 5005
  debug: false
  max_content_length: 16777216    # 16MB
  cors_origins:
    - "http://localhost:3000"

gpu:
  cuda_visible_devices: "0"       # "0" = first GPU, "-1" = CPU only
  tf_memory_fraction: 0.8         # use up to 80% of VRAM
  tf_allow_growth: true           # allocate VRAM dynamically (recommended)
  tf_log_level: 2                 # 0=all, 1=info, 2=warnings, 3=errors
  omp_num_threads: 0              # 0 = auto-detect all CPU cores

deepface:
  detector_backend: "retinaface"  # retinaface (accurate/GPU) or opencv (fast/CPU)
  model_name: "Facenet"           # VGG-Face, Facenet, Facenet512, ArcFace, etc.
  distance_metric: "cosine"       # cosine, euclidean, euclidean_l2
  anti_spoofing: true
  confidence_threshold: 0.1

  ensemble:
    enabled: true
    detectors:
      - retinaface
      - mtcnn
      - centerface
    weights:
      retinaface: 0.50
      mtcnn: 0.30
      centerface: 0.20

gemini:
  text_model: "gemini-2.5-flash"
  image_model: "gemini-2.5-flash-image"
  fallback_image_models:
    - "gemini-3.1-flash-image-preview"
    - "gemini-3-pro-image-preview"
  request_timeout: 120            # seconds
  max_retries: 3
  retry_base_delay: 1.0           # seconds

emotion:
  noise_floor: 0.10               # filter emotions below 10%
  keyframe_limit: 4
  visual_aspect_ratio: "16:9"
  visual_style_preset: "futuristic"

supabase:
  bucket_name: "syn_cve_assets"

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" fill="none">
  <defs>
    <linearGradient id="bannerBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0a1e"/>
      <stop offset="40%" stop-color="#1a1145"/>
      <stop offset="100%" stop-color="#0d0820"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0"/>
      <stop offset="20%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="80%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#ec4899" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="logoBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#c4b5fd"/>
    </linearGradient>
    <radialGradient id="orbGlow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orbGlow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orbGlow3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ec4899" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#ec4899" stop-opacity="0"/>
    </radialGradient>
    <filter id="logoShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#6366f1" flood-opacity="0.5"/>
    </filter>
    <filter id="textShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#6366f1" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="300" rx="16" fill="url(#bannerBg)"/>

  <!-- Grid pattern (subtle) -->
  <g opacity="0.03" stroke="white" stroke-width="0.5">
    <line x1="0" y1="60" x2="900" y2="60"/><line x1="0" y1="120" x2="900" y2="120"/>
    <line x1="0" y1="180" x2="900" y2="180"/><line x1="0" y1="240" x2="900" y2="240"/>
    <line x1="112.5" y1="0" x2="112.5" y2="300"/><line x1="225" y1="0" x2="225" y2="300"/>
    <line x1="337.5" y1="0" x2="337.5" y2="300"/><line x1="450" y1="0" x2="450" y2="300"/>
    <line x1="562.5" y1="0" x2="562.5" y2="300"/><line x1="675" y1="0" x2="675" y2="300"/>
    <line x1="787.5" y1="0" x2="787.5" y2="300"/>
  </g>

  <!-- Ambient glow orbs -->
  <circle cx="160" cy="150" r="180" fill="url(#orbGlow1)"/>
  <circle cx="650" cy="80" r="150" fill="url(#orbGlow2)"/>
  <circle cx="800" cy="220" r="120" fill="url(#orbGlow3)"/>

  <!-- Accent lines -->
  <rect x="0" y="0" width="900" height="3" rx="1.5" fill="url(#accentLine)"/>
  <rect x="0" y="297" width="900" height="3" rx="1.5" fill="url(#accentLine)"/>

  <!-- Neural network background decoration (right side) -->
  <g opacity="0.12" fill="white">
    <circle cx="680" cy="70" r="2.5"/><circle cx="720" cy="55" r="2"/>
    <circle cx="760" cy="80" r="2.2"/><circle cx="800" cy="60" r="1.8"/>
    <circle cx="840" cy="90" r="2"/><circle cx="710" cy="100" r="1.5"/>
    <circle cx="750" cy="115" r="2.5"/><circle cx="790" cy="105" r="1.8"/>
    <circle cx="830" cy="120" r="2"/><circle cx="860" cy="65" r="1.5"/>
    <circle cx="700" cy="140" r="2"/><circle cx="770" cy="150" r="1.5"/>
    <circle cx="820" cy="145" r="2.2"/><circle cx="850" cy="160" r="1.8"/>
  </g>
  <g opacity="0.06" stroke="white" stroke-width="0.6">
    <line x1="680" y1="70" x2="720" y2="55"/><line x1="720" y1="55" x2="760" y2="80"/>
    <line x1="760" y1="80" x2="800" y2="60"/><line x1="800" y1="60" x2="840" y2="90"/>
    <line x1="710" y1="100" x2="750" y2="115"/><line x1="750" y1="115" x2="790" y2="105"/>
    <line x1="790" y1="105" x2="830" y2="120"/><line x1="680" y1="70" x2="710" y2="100"/>
    <line x1="720" y1="55" x2="750" y2="115"/><line x1="760" y1="80" x2="790" y2="105"/>
    <line x1="800" y1="60" x2="830" y2="120"/><line x1="840" y1="90" x2="850" y2="160"/>
    <line x1="700" y1="140" x2="770" y2="150"/><line x1="770" y1="150" x2="820" y2="145"/>
    <line x1="820" y1="145" x2="850" y2="160"/>
  </g>

  <!-- Emotion wave decoration (bottom right) -->
  <path d="M600 230 Q640 210 680 225 Q720 240 760 220 Q800 200 840 225 Q860 240 880 230" fill="none" stroke="#fbbf24" stroke-width="1.2" opacity="0.12" stroke-linecap="round"/>
  <path d="M620 250 Q660 235 700 248 Q740 260 780 240 Q820 225 860 248" fill="none" stroke="#f59e0b" stroke-width="0.8" opacity="0.08" stroke-linecap="round"/>

  <!-- Logo icon (larger, with glow) -->
  <g transform="translate(65, 70)" filter="url(#logoShadow)">
    <circle cx="70" cy="70" r="64" fill="url(#logoBg)" opacity="0.95"/>
    <circle cx="70" cy="70" r="60" fill="none" stroke="white" stroke-width="0.5" opacity="0.15"/>
    <!-- Eye -->
    <path d="M26 70c0 0 19-26 44-26s44 26 44 26-19 26-44 26S26 70 26 70z" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Iris -->
    <circle cx="70" cy="70" r="15" fill="white" opacity="0.95"/>
    <circle cx="70" cy="70" r="10.5" fill="#1e1b4b"/>
    <circle cx="66" cy="66" r="3.5" fill="white" opacity="0.85"/>
    <circle cx="74" cy="74" r="1.5" fill="white" opacity="0.4"/>
    <!-- Emotion wave -->
    <path d="M48 88 Q57 98 70 94 Q83 90 92 88" fill="none" stroke="#fbbf24" stroke-width="2.2" stroke-linecap="round"/>
    <!-- Neural dots on iris ring -->
    <circle cx="55" cy="58" r="1.2" fill="white" opacity="0.3"/>
    <circle cx="85" cy="58" r="1.2" fill="white" opacity="0.3"/>
    <circle cx="70" cy="50" r="1" fill="white" opacity="0.25"/>
  </g>

  <!-- Title -->
  <text x="260" y="120" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="58" font-weight="800" fill="url(#textGrad)" letter-spacing="-2" filter="url(#textShadow)">SynCVE</text>

  <!-- Subtitle with letter-spacing -->
  <text x="262" y="155" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="15" fill="#a5b4fc" letter-spacing="4.5" font-weight="400">SYNCHRONIZED COMPUTER VISION EMOTION</text>

  <!-- Description -->
  <text x="262" y="192" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="14.5" fill="#94a3b8">GPU-accelerated real-time facial emotion recognition platform</text>
  <text x="262" y="212" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="14.5" fill="#94a3b8">with ensemble detectors, anti-spoofing, and AI-powered analytics.</text>

  <!-- Version tag -->
  <g transform="translate(262,230)">
    <rect width="60" height="22" rx="4" fill="#6366f1" opacity="0.2" stroke="#6366f1" stroke-width="0.5"/>
    <text x="30" y="15" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="10" fill="#a5b4fc" font-weight="600">v1.0.0</text>
  </g>
  <g transform="translate(332,230)">
    <rect width="52" height="22" rx="4" fill="#34d399" opacity="0.15" stroke="#34d399" stroke-width="0.5"/>
    <text x="26" y="15" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="10" fill="#6ee7b7" font-weight="600">GPU</text>
  </g>
  <g transform="translate(394,230)">
    <rect width="68" height="22" rx="4" fill="#f59e0b" opacity="0.15" stroke="#f59e0b" stroke-width="0.5"/>
    <text x="34" y="15" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="10" fill="#fcd34d" font-weight="600">Real-time</text>
  </g>
  <g transform="translate(472,230)">
    <rect width="90" height="22" rx="4" fill="#ec4899" opacity="0.15" stroke="#ec4899" stroke-width="0.5"/>
    <text x="45" y="15" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="10" fill="#f9a8d4" font-weight="600">Anti-Spoofing</text>
  </g>
</svg>

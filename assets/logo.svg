<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c084fc" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0.2"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#6366f1" flood-opacity="0.4"/>
    </filter>
  </defs>
  <!-- Background circle -->
  <circle cx="60" cy="60" r="56" fill="url(#bg)"/>
  <circle cx="60" cy="60" r="52" fill="none" stroke="url(#glow)" stroke-width="1.5"/>
  <!-- Eye shape (vision) -->
  <path d="M24 60c0 0 16-24 36-24s36 24 36 24-16 24-36 24S24 60 24 60z" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" filter="url(#shadow)"/>
  <!-- Iris -->
  <circle cx="60" cy="60" r="14" fill="white" opacity="0.9"/>
  <circle cx="60" cy="60" r="10" fill="#1e1b4b"/>
  <!-- Pupil highlight -->
  <circle cx="56" cy="56" r="3" fill="white" opacity="0.8"/>
  <!-- Emotion wave (smile curve below eye) -->
  <path d="M40 78 Q50 88 60 84 Q70 80 80 78" fill="none" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Neural dots -->
  <circle cx="30" cy="42" r="2" fill="white" opacity="0.5"/>
  <circle cx="90" cy="42" r="2" fill="white" opacity="0.5"/>
  <circle cx="36" cy="32" r="1.5" fill="white" opacity="0.4"/>
  <circle cx="84" cy="32" r="1.5" fill="white" opacity="0.4"/>
  <circle cx="60" cy="28" r="1.5" fill="white" opacity="0.3"/>
  <!-- Connection lines (neural) -->
  <line x1="30" y1="42" x2="36" y2="32" stroke="white" stroke-width="0.5" opacity="0.3"/>
  <line x1="36" y1="32" x2="60" y2="28" stroke="white" stroke-width="0.5" opacity="0.3"/>
  <line x1="60" y1="28" x2="84" y2="32" stroke="white" stroke-width="0.5" opacity="0.3"/>
  <line x1="84" y1="32" x2="90" y2="42" stroke="white" stroke-width="0.5" opacity="0.3"/>
</svg>

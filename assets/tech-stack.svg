<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 160" fill="none">
  <defs>
    <linearGradient id="tsBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c0a1d"/><stop offset="100%" stop-color="#141030"/>
    </linearGradient>
    <filter id="tsGlow">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="880" height="160" rx="12" fill="url(#tsBg)"/>

  <!-- Row 1: Core ML -->
  <g transform="translate(30,18)">
    <!-- Python -->
    <g>
      <rect x="0" y="0" width="90" height="54" rx="8" fill="#1e293b" stroke="#3572A5" stroke-width="1"/>
      <text x="45" y="24" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="10" fill="#3572A5" font-weight="600">Python</text>
      <text x="45" y="42" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="16" fill="#e2e8f0" font-weight="700">3.10</text>
    </g>
    <!-- TensorFlow -->
    <g transform="translate(100,0)">
      <rect x="0" y="0" width="120" height="54" rx="8" fill="#1e293b" stroke="#FF6F00" stroke-width="1"/>
      <text x="60" y="24" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="10" fill="#FF6F00" font-weight="600">TensorFlow</text>
      <text x="60" y="42" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="16" fill="#e2e8f0" font-weight="700">2.10.1</text>
    </g>
    <!-- PyTorch -->
    <g transform="translate(230,0)">
      <rect x="0" y="0" width="120" height="54" rx="8" fill="#1e293b" stroke="#EE4C2C" stroke-width="1"/>
      <text x="60" y="24" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="10" fill="#EE4C2C" font-weight="600">PyTorch</text>
      <text x="60" y="42" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="16" fill="#e2e8f0" font-weight="700">2.1+cu118</text>
    </g>
    <!-- DeepFace -->
    <g transform="translate(360,0)">
      <rect x="0" y="0" width="110" height="54" rx="8" fill="#1e293b" stroke="#a855f7" stroke-width="1"/>
      <text x="55" y="24" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="10" fill="#a855f7" font-weight="600">DeepFace</text>
      <text x="55" y="42" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="16" fill="#e2e8f0" font-weight="700">0.0.99</text>
    </g>
    <!-- CUDA -->
    <g transform="translate(480,0)">
      <rect x="0" y="0" width="100" height="54" rx="8" fill="#1e293b" stroke="#76B900" stroke-width="1"/>
      <text x="50" y="24" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="10" fill="#76B900" font-weight="600">CUDA + cuDNN</text>
      <text x="50" y="42" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="16" fill="#e2e8f0" font-weight="700">11.8</text>
    </g>
  </g>

  <!-- Row 2: Web + Infra -->
  <g transform="translate(30,86)">
    <!-- React -->
    <g>
      <rect x="0" y="0" width="90" height="54" rx="8" fill="#1e293b" stroke="#61dafb" stroke-width="1"/>
      <text x="45" y="24" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="10" fill="#61dafb" font-weight="600">React</text>
      <text x="45" y="42" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="16" fill="#e2e8f0" font-weight="700">18.3</text>
    </g>
    <!-- Flask -->
    <g transform="translate(100,0)">
      <rect x="0" y="0" width="90" height="54" rx="8" fill="#1e293b" stroke="#94a3b8" stroke-width="1"/>
      <text x="45" y="24" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="10" fill="#94a3b8" font-weight="600">Flask</text>
      <text x="45" y="42" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="16" fill="#e2e8f0" font-weight="700">3.x</text>
    </g>
    <!-- Supabase -->
    <g transform="translate(200,0)">
      <rect x="0" y="0" width="110" height="54" rx="8" fill="#1e293b" stroke="#3ecf8e" stroke-width="1"/>
      <text x="55" y="24" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="10" fill="#3ecf8e" font-weight="600">Supabase</text>
      <text x="55" y="42" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="16" fill="#e2e8f0" font-weight="700">BaaS</text>
    </g>
    <!-- Gemini -->
    <g transform="translate(320,0)">
      <rect x="0" y="0" width="110" height="54" rx="8" fill="#1e293b" stroke="#4285f4" stroke-width="1"/>
      <text x="55" y="24" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="10" fill="#4285f4" font-weight="600">Gemini AI</text>
      <text x="55" y="42" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="16" fill="#e2e8f0" font-weight="700">2.5 Flash</text>
    </g>
    <!-- Docker -->
    <g transform="translate(440,0)">
      <rect x="0" y="0" width="90" height="54" rx="8" fill="#1e293b" stroke="#2496ED" stroke-width="1"/>
      <text x="45" y="24" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="10" fill="#2496ED" font-weight="600">Docker</text>
      <text x="45" y="42" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="16" fill="#e2e8f0" font-weight="700">24+</text>
    </g>
    <!-- nginx -->
    <g transform="translate(540,0)">
      <rect x="0" y="0" width="90" height="54" rx="8" fill="#1e293b" stroke="#009639" stroke-width="1"/>
      <text x="45" y="24" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="10" fill="#009639" font-weight="600">nginx</text>
      <text x="45" y="42" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="16" fill="#e2e8f0" font-weight="700">Alpine</text>
    </g>
  </g>

  <!-- Label -->
  <text x="710" y="48" font-family="'Segoe UI',system-ui,sans-serif" font-size="11" fill="#64748b" font-weight="500">MACHINE</text>
  <text x="710" y="62" font-family="'Segoe UI',system-ui,sans-serif" font-size="11" fill="#64748b" font-weight="500">LEARNING</text>
  <line x1="700" y1="30" x2="700" y2="70" stroke="#6366f1" stroke-width="2" opacity="0.6"/>

  <text x="710" y="114" font-family="'Segoe UI',system-ui,sans-serif" font-size="11" fill="#64748b" font-weight="500">WEB &amp;</text>
  <text x="710" y="128" font-family="'Segoe UI',system-ui,sans-serif" font-size="11" fill="#64748b" font-weight="500">INFRA</text>
  <line x1="700" y1="98" x2="700" y2="136" stroke="#a855f7" stroke-width="2" opacity="0.6"/>
</svg>
